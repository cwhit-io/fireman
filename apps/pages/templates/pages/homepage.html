{% extends "base.html" %}
{% load static %}

{% block title %}Welcome to Fireman{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <img src="{% static 'logo.png' %}" alt="Fireman Logo" class="w-24 h-24 rounded-full bg-white p-2 shadow mb-4" />
    <h1 class="text-4xl font-bold mb-2">Welcome to Fireman</h1>
    <p class="text-lg text-gray-600 mb-6">Your incident management dashboard</p>
    <div class="flex flex-wrap gap-4 justify-center">
        <a href="{% url 'jobs:list' %}" class="btn btn-primary">View Jobs</a>
        <a href="{% url 'impose:list' %}" class="btn btn-secondary">Templates</a>
        <a href="{% url 'cutter:list' %}" class="btn btn-secondary">Cutters</a>
        <a href="{% url 'routing:list' %}" class="btn btn-secondary">Presets</a>
        <a href="{% url 'rules:list' %}" class="btn btn-secondary">Rulesets</a>
    </div>
</div>
{% endblock %}
