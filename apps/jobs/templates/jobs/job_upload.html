{% extends "base.html" %}
{% block title %}Upload Print Job{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold mb-6">Upload Print Job</h1>
  {% if messages %}
    {% for message in messages %}
      <div class="mb-4 p-3 rounded {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">{{ message }}</div>
    {% endfor %}
  {% endif %}
  <div class="bg-white shadow rounded-lg p-6">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-4">
        <label for="file" class="block text-sm font-medium text-gray-700 mb-1">PDF File</label>
        <input type="file" name="file" id="file" accept=".pdf" required
          class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        <p class="mt-1 text-xs text-gray-500">Only PDF files are accepted.</p>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 font-medium">
        Upload &amp; Process
      </button>
    </form>
  </div>
  <div class="mt-4 text-center">
    <a href="{% url 'jobs:list' %}" class="text-blue-600 hover:underline text-sm">← Back to job list</a>
  </div>
</div>
{% endblock %}
