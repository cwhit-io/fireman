{% extends "base.html" %}

{% block main_class %}overflow-hidden{% endblock %}

{% block content %}
{# Hidden form solely to render the CSRF token for JS fetch calls #}
<form id="csrf-form" hidden>{% csrf_token %}</form>

<div class="flex overflow-hidden" style="height:100dvh">

  <!-- ── Left: scrollable controls ── -->
  <div class="w-80 shrink-0 overflow-y-auto border-r border-base-300 pt-8 px-3 pb-3 space-y-3 bg-base-100">
    <div class="mb-6">

      <h1 class="text-3xl font-extrabold tracking-tight">QR Generator</h1>
    </div>
    <!-- Data Type Tabs -->
    <div class="tabs tabs-bordered tabs-sm w-full">
      <input type="radio" name="data_type" class="tab text-xs" aria-label="URL"   value="url"   checked onchange="switchTab('url')" />
      <input type="radio" name="data_type" class="tab text-xs" aria-label="Text"  value="text"  onchange="switchTab('text')" />
      <input type="radio" name="data_type" class="tab text-xs" aria-label="Email" value="email" onchange="switchTab('email')" />
      <input type="radio" name="data_type" class="tab text-xs" aria-label="vCard" value="vcard" onchange="switchTab('vcard')" />
      <input type="radio" name="data_type" class="tab text-xs" aria-label="WiFi"  value="wifi"  onchange="switchTab('wifi')" />
    </div>

    <!-- URL -->
    <div id="tab-url">
      <input type="url" id="url-input" placeholder="https://example.com" class="input input-bordered input-sm w-full" oninput="debouncedUpdatePreview()" />
    </div>

    <!-- Text -->
    <div id="tab-text" class="hidden">
      <textarea id="text-input" placeholder="Enter any text" class="textarea textarea-bordered textarea-sm w-full h-20" oninput="debouncedUpdatePreview()"></textarea>
    </div>

    <!-- Email -->
    <div id="tab-email" class="hidden space-y-1">
      <input type="email" id="email-input" placeholder="user@example.com" class="input input-bordered input-sm w-full" oninput="debouncedUpdatePreview()" />
      <input type="text"  id="email-subject" placeholder="Subject (optional)" class="input input-bordered input-sm w-full" oninput="debouncedUpdatePreview()" />
    </div>

    <!-- vCard -->
    <div id="tab-vcard" class="hidden grid grid-cols-2 gap-1">
      <input type="text"  id="vcard-fn"    placeholder="First name" class="input input-bordered input-sm" oninput="debouncedUpdatePreview()" />
      <input type="text"  id="vcard-ln"    placeholder="Last name"  class="input input-bordered input-sm" oninput="debouncedUpdatePreview()" />
      <input type="tel"   id="vcard-phone" placeholder="Phone"      class="input input-bordered input-sm" oninput="debouncedUpdatePreview()" />
      <input type="email" id="vcard-email" placeholder="Email"      class="input input-bordered input-sm" oninput="debouncedUpdatePreview()" />
    </div>

    <!-- WiFi -->
    <div id="tab-wifi" class="hidden space-y-1">
      <input type="text"     id="wifi-ssid"     placeholder="Network SSID"  class="input input-bordered input-sm w-full" oninput="debouncedUpdatePreview()" />
      <input type="password" id="wifi-password" placeholder="Password"      class="input input-bordered input-sm w-full" oninput="debouncedUpdatePreview()" />
      <select id="wifi-security" class="select select-bordered select-sm w-full" onchange="updatePreview()">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">Open</option>
      </select>
    </div>

    <div class="divider my-1"></div>

    <!-- ── Colors ── -->
    <details class="group">
      <summary class="cursor-pointer text-sm font-semibold select-none list-none flex items-center justify-between">
        <span>🎨 Colors</span>
        <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </summary>
      <div class="mt-2 grid grid-cols-2 gap-2">
        <div>
          <label class="label py-0.5"><span class="label-text text-xs">Foreground</span></label>
          <input type="color" id="fg-color" value="#000000" class="input input-bordered input-sm h-9 w-full p-1 cursor-pointer" oninput="updatePreview()" />
        </div>
        <div>
          <label class="label py-0.5"><span class="label-text text-xs">Background</span></label>
          <input type="color" id="bg-color" value="#FFFFFF" class="input input-bordered input-sm h-9 w-full p-1 cursor-pointer" oninput="updatePreview()" />
        </div>
      </div>
    </details>

    <!-- ── Logo ── -->
    <details class="group">
      <summary class="cursor-pointer text-sm font-semibold select-none list-none flex items-center justify-between">
        <span>🖼️ Logo</span>
        <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </summary>
      <div class="mt-2 space-y-2">
        <input type="file" id="logo-input" accept="image/*" class="file-input file-input-bordered file-input-sm w-full" onchange="uploadLogo()" />
        <div id="logo-preview" class="hidden flex items-center gap-2">
          <img id="logo-preview-img" class="w-12 h-12 rounded border border-base-300 object-contain" />
          <button type="button" onclick="removeLogo()" class="btn btn-xs btn-error">Remove</button>
        </div>
        <div>
          <label class="label py-0.5"><span class="label-text text-xs">Position</span></label>
          <select id="logo-position" class="select select-bordered select-sm w-full" onchange="updatePreview()">
            <option value="center">Center</option>
            <option value="top">Top</option>
            <option value="bottom">Bottom</option>
          </select>
        </div>
      </div>
    </details>

    <!-- ── Design ── -->
    <details class="group" open>
      <summary class="cursor-pointer text-sm font-semibold select-none list-none flex items-center justify-between">
        <span>⚙️ Design</span>
        <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </summary>
      <div class="mt-2 space-y-2">
        <div>
          <label class="label py-0.5"><span class="label-text text-xs">Style</span></label>
          <select id="style-select" class="select select-bordered select-sm w-full" onchange="updatePreview()">
            <option value="square">Squares</option>
            <option value="circle">Dots</option>
            <option value="rounded">Rounded</option>
          </select>
        </div>
        <div>
          <label class="label py-0.5"><span class="label-text text-xs">Format</span></label>
          <div class="join w-full">
            <input type="radio" name="qr-format" value="png" class="join-item btn btn-xs flex-1" aria-label="PNG" checked onchange="updatePreview()" />
            <input type="radio" name="qr-format" value="svg" class="join-item btn btn-xs flex-1" aria-label="SVG" onchange="updatePreview()" />
            <input type="radio" name="qr-format" value="pdf" class="join-item btn btn-xs flex-1" aria-label="PDF" onchange="updatePreview()" />
          </div>
        </div>
        <div>
          <label class="label py-0.5">
            <span class="label-text text-xs">Quality</span>
            <span class="label-text-alt text-xs" id="quality-value">10</span>
          </label>
          <input type="range" id="quality-slider" min="5" max="20" value="10" class="range range-sm" oninput="debouncedUpdatePreview()" />
          <div class="flex justify-between text-xs text-base-content/40 px-1"><span>Low</span><span>High</span></div>
        </div>
        <div>
          <label class="label py-0.5"><span class="label-text text-xs">Output size (px)</span></label>
          <input type="number" id="size-input" min="100" max="1000" value="300" class="input input-bordered input-sm w-full" oninput="debouncedUpdatePreview()" />
        </div>
      </div>
    </details>

  </div><!-- /left -->

  <!-- ── Right: preview (always visible) ── -->
  <div class="flex-1 flex flex-col items-center justify-center gap-4 p-6 bg-base-200/40">

    <div id="preview-container" class="flex items-center justify-center bg-base-100 rounded-2xl shadow-lg"
         style="width:min(100%,320px);height:min(calc(100dvh - 10rem),320px)">
      <div class="loading loading-spinner loading-lg"></div>
    </div>

    <!-- Download buttons -->
    <div class="flex gap-2 flex-wrap justify-center">
      <a id="download-png" href="#" download="qr-code.png" class="btn btn-sm btn-outline gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        PNG
      </a>
      <a id="download-svg" href="#" download="qr-code.svg" class="btn btn-sm btn-outline gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        SVG
      </a>
      <a id="download-pdf" href="#" download="qr-code.pdf" class="btn btn-sm btn-outline gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        PDF
      </a>
    </div>

  </div><!-- /right -->

</div><!-- /flex -->

<script>
  let currentLogoId = null;

  function debounce(fn, delay) {
    let timer;
    return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
  }
  const debouncedUpdatePreview = debounce(updatePreview, 400);

  function switchTab(tabName) {
    ['url','text','email','vcard','wifi'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tabName);
    });
    updatePreview();
  }

  function getQRData() {
    const activeTab = document.querySelector('input[name="data_type"]:checked').value;
    switch (activeTab) {
      case 'url':   return document.getElementById('url-input').value;
      case 'text':  return document.getElementById('text-input').value;
      case 'email': {
        const e = document.getElementById('email-input').value;
        const s = document.getElementById('email-subject').value;
        return `mailto:${e}${s ? '?subject=' + encodeURIComponent(s) : ''}`;
      }
      case 'vcard': {
        const fn = document.getElementById('vcard-fn').value;
        const ln = document.getElementById('vcard-ln').value;
        return `BEGIN:VCARD\nVERSION:3.0\nFN:${fn} ${ln}\nTEL:${document.getElementById('vcard-phone').value}\nEMAIL:${document.getElementById('vcard-email').value}\nEND:VCARD`;
      }
      case 'wifi': {
        const s = document.getElementById('wifi-ssid').value;
        const p = document.getElementById('wifi-password').value;
        const t = document.getElementById('wifi-security').value;
        return `WIFI:T:${t};S:${s};P:${p};;`;
      }
      default: return '';
    }
  }

  function getSelectedFormat() {
    return document.querySelector('input[name="qr-format"]:checked')?.value || 'png';
  }

  function updatePreview() {
    const data = getQRData();
    if (!data.trim()) {
      document.getElementById('preview-container').innerHTML =
        '<span class="text-base-content/40 text-sm">Enter data above</span>';
      return;
    }

    const quality = parseInt(document.getElementById('quality-slider').value);
    document.getElementById('quality-value').textContent = quality;

    const payload = {
      data,
      size: parseInt(document.getElementById('size-input').value),
      quality,
      style: document.getElementById('style-select').value,
      fg_color: document.getElementById('fg-color').value,
      bg_color: document.getElementById('bg-color').value,
      format: getSelectedFormat(),
      logo_id: currentLogoId,
      logo_position: document.getElementById('logo-position').value,
    };

    document.getElementById('preview-container').innerHTML =
      '<div class="loading loading-spinner loading-md"></div>';

    fetch('{% url "api_generate_preview" %}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
      body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(result => {
      if (result.error) {
        document.getElementById('preview-container').innerHTML = `<span class="text-error text-sm">${result.error}</span>`;
        return;
      }
      let preview;
      if (result.format === 'svg') {
        preview = `<div class="w-full h-full flex items-center justify-center p-2">${result.data}</div>`;
      } else if (result.format === 'pdf') {
        preview = `<embed src="${result.data}" type="application/pdf" class="w-full h-full rounded-xl" />`;
      } else {
        preview = `<img src="${result.data}" class="max-w-full max-h-full object-contain rounded-xl p-2" />`;
      }
      document.getElementById('preview-container').innerHTML = preview;
      updateDownloadLinks(payload);
    })
    .catch(() => {
      document.getElementById('preview-container').innerHTML =
        '<span class="text-error text-sm">Failed to generate preview</span>';
    });
  }

  function updateDownloadLinks(payload) {
    const base = new URLSearchParams({
      data: payload.data, size: payload.size, quality: payload.quality,
      style: payload.style, fg_color: payload.fg_color, bg_color: payload.bg_color,
      logo_position: payload.logo_position,
      ...(payload.logo_id ? { logo_id: payload.logo_id } : {}),
    });
    const root = '{% url "qr_image" %}';
    document.getElementById('download-png').href = `${root}?${base}&format=png`;
    document.getElementById('download-svg').href = `${root}?${base}&format=svg`;
    document.getElementById('download-pdf').href = `${root}?${base}&format=pdf`;
  }

  function uploadLogo() {
    const file = document.getElementById('logo-input').files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('logo', file);
    fetch('{% url "upload_logo" %}', {
      method: 'POST', body: fd,
      headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
    })
    .then(r => r.json())
    .then(d => {
      if (d.logo_id) { currentLogoId = d.logo_id; showLogoPreview(file); updatePreview(); }
      else alert('Upload failed: ' + (d.error || 'Unknown error'));
    })
    .catch(() => alert('Upload failed'));
  }

  function showLogoPreview(file) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('logo-preview-img').src = e.target.result;
      document.getElementById('logo-preview').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  }

  function removeLogo() {
    document.getElementById('logo-input').value = '';
    document.getElementById('logo-preview').classList.add('hidden');
    currentLogoId = null;
    updatePreview();
  }

  document.addEventListener('DOMContentLoaded', () => setTimeout(updatePreview, 300));
</script>

{% endblock %}
