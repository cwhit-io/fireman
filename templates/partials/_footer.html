{% load static %}
{# Site footer — semantic <footer> with nav links and brand tagline #}
<footer class="footer footer-center bg-base-200 text-base-content border-t border-base-300 p-10 mt-16">
  <aside class="flex flex-col items-center gap-2">
    <img
      src="{% static 'logo.png' %}"
      alt="Ember logo"
      class="w-24 h-24 opacity-80"
    />
  </aside>


  <aside>
    <p class="text-base-content/40 text-xs">&copy; {% now "Y" %} Ember. Built with ❤️ for busy print teams.</p>
  </aside>
</footer>
