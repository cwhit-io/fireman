{% comment %}Reusable section heading component.
  Usage: {% include "partials/_section_header.html" with title="My Title" subtitle="Optional subtitle" %}{% endcomment %}
<div class="text-center mb-10">
  <h2 class="text-3xl font-bold tracking-tight">{{ title }}</h2>
  {% if subtitle %}
    <p class="mt-3 text-base-content/60 text-lg max-w-2xl mx-auto">{{ subtitle }}</p>
  {% endif %}
</div>
